name: Deploy to EC2

on:
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Redesplegar backend'
        required: false
        default: 'true'
        type: boolean
      deploy_frontend:
        description: 'Redesplegar frontend'
        required: false
        default: 'true'
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Debug - Verificar variables
        run: |
          echo "BACKEND_IMAGE: '${{ vars.BACKEND_IMAGE }}'"
          echo "FRONTEND_IMAGE: '${{ vars.FRONTEND_IMAGE }}'"
          if [ -z "${{ vars.BACKEND_IMAGE }}" ]; then
            echo "::error::BACKEND_IMAGE está vacía"
            exit 1
          fi
          if [ -z "${{ vars.FRONTEND_IMAGE }}" ]; then
            echo "::error::FRONTEND_IMAGE está vacía"
            exit 1
          fi

      - name: Create docker-compose.yml
        run: |
          cat > docker-compose.yml << 'COMPOSE_EOF'
          services:
            backend:
              image: ${{ vars.BACKEND_IMAGE }}
              container_name: app-backend
              restart: unless-stopped
              ports:
                - "3000:3000"
              environment:
                NODE_ENV: production
                PORT: 3000
                NODE_TLS_REJECT_UNAUTHORIZED: 0
                DATABASE_URL: "postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@${{ secrets.RDS_HOST }}:${{ secrets.RDS_PORT }}/${{ secrets.RDS_DBNAME }}?schema=public&sslmode=require"
                JWT_SECRET: "${{ secrets.JWT_SECRET }}"
                REDIS_URL: "redis://redis:6379"
                REDIS_HOST: redis
                REDIS_PORT: 6379
                CORS_ORIGIN: "${{ secrets.CORS_ORIGIN }}"
                VERIFICATION_CODE_TTL: "600"
                VERIFICATION_RATE_LIMIT_SECONDS: "60"
                GOOGLE_MAPS_API_KEY: "${{ secrets.GOOGLE_MAPS_API_KEY }}"
                BREVO_API_KEY: "${{ secrets.BREVO_API_KEY }}"
                BREVO_SENDER_EMAIL: "${{ secrets.BREVO_SENDER_EMAIL }}"
                BREVO_SENDER_NAME: "${{ secrets.BREVO_SENDER_NAME }}"
                AWS_REGION: us-east-1
                AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
                AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
                AWS_S3_BUCKET: "${{ secrets.S3_BUCKET }}"
                AWS_S3_SIGNED_URL_TTL: "3600"
              depends_on:
                redis:
                  condition: service_healthy
              networks:
                - app-network
              healthcheck:
                test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api-docs',r=>process.exit(r.statusCode===200||r.statusCode===301||r.statusCode===302?0:1)).on('error',()=>process.exit(1))"]
                interval: 30s
                timeout: 5s
                start_period: 40s
                retries: 3

            frontend:
              image: ${{ vars.FRONTEND_IMAGE }}
              container_name: app-frontend
              restart: unless-stopped
              ports:
                - "80:80"
              depends_on:
                - backend
              networks:
                - app-network
              healthcheck:
                test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
                interval: 30s
                timeout: 5s
                start_period: 10s
                retries: 3

            redis:
              image: redis:7-alpine
              container_name: app-redis
              restart: unless-stopped
              ports:
                - "6379:6379"
              networks:
                - app-network
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 10s
                timeout: 3s
                start_period: 5s
                retries: 5
              volumes:
                - redis-data:/data

          networks:
            app-network:
              driver: bridge

          volumes:
            redis-data:
              driver: local
          COMPOSE_EOF

      - name: Copy docker-compose.yml to EC2
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            docker-compose.yml ubuntu@${{ secrets.EC2_HOST }}:/tmp/docker-compose.yml

      - name: Deploy services on EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          
          # Mover docker-compose a la ubicación correcta
          sudo mv /tmp/docker-compose.yml /opt/app/docker-compose.yml
          sudo chown ubuntu:ubuntu /opt/app/docker-compose.yml
          
          cd /opt/app
          
          # Determinar qué servicios redesplegar
          SERVICES=""
          ${{ github.event.inputs.deploy_backend == 'true' }} && SERVICES="$SERVICES backend"
          ${{ github.event.inputs.deploy_frontend == 'true' }} && SERVICES="$SERVICES frontend"
          
          # Si no se especificó nada, redesplegar todo
          if [ -z "$SERVICES" ]; then
            SERVICES="backend frontend redis"
          fi
          
          echo "🔄 Desplegando servicios: $SERVICES"
          
          # Pull de imágenes (solo las necesarias)
          sudo docker compose pull $SERVICES
          
          # Redesplegar servicios
          sudo docker compose up -d $SERVICES
          
          echo "✅ Deploy completado"
          echo ""
          echo "📊 Estado de contenedores:"
          sudo docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          EOF

      - name: Show deployment info
        run: |
          echo "## ✅ Deploy Completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URLs de acceso:**" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: http://${{ secrets.EC2_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- API: http://${{ secrets.EC2_HOST }}:3000" >> $GITHUB_STEP_SUMMARY
          echo "- Swagger: http://${{ secrets.EC2_HOST }}:3000/api-docs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Imágenes desplegadas:**" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ vars.BACKEND_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ vars.FRONTEND_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
