---
# Contenedores: imágenes Node (Nest) + nginx (Vue build). Sin JVM.
- name: Directorio keyrings (Docker)
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Clave GPG de Docker
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  become: true

- name: Repositorio de Docker
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  become: true

- name: Instalar Docker Engine y Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true
    state: present
  become: true

- name: Usuario ubuntu en grupo docker
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true
  become: true

- name: Servicio Docker activo
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  become: true

- name: Copiar docker-compose (Vue + Nest)
  ansible.builtin.copy:
    src: ../../../../docker/docker-compose.yml
    dest: /opt/app/docker-compose.yml
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  become: true
