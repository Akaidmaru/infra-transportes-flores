---
# Node.js LTS para builds locales, herramientas TS/JS y node-gyp (Nest/Vue)
- name: Crear directorio keyrings
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Clave de firma NodeSource
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"
  become: true

- name: Repositorio NodeSource (Node {{ nodejs_major_version }})
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ nodejs_major_version }}.x nodistro main"
    state: present
    filename: nodesource
  become: true

- name: Instalar Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
  become: true

- name: Versión de Node y npm
  ansible.builtin.command: node -v && npm -v
  register: node_versions
  changed_when: false

- name: Mostrar Node/npm instalados
  ansible.builtin.debug:
    msg: "{{ node_versions.stdout_lines }}"
