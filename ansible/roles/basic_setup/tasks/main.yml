---
# python3/build-essential: dependencias nativas de npm (node-gyp), no Java.
- name: Actualizar cache de APT
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Paquetes base (build, Git, herramientas)
  ansible.builtin.apt:
    name:
      - unzip
      - curl
      - git
      - vim
      - htop
      - ca-certificates
      - gnupg
      - build-essential
      - python3
    state: present
