---
# Deploy manual: usa repos ya clonados, copia Dockerfiles si no existen, compila y despliega.

- name: Verificar que directorio de apps existe
  ansible.builtin.stat:
    path: /home/ubuntu/apps
  register: apps_dir

- name: Crear directorio para aplicaciones (si no existe)
  ansible.builtin.file:
    path: /home/ubuntu/apps
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  become: true
  when: not apps_dir.stat.exists

- name: Verificar que repositorio backend existe
  ansible.builtin.stat:
    path: /home/ubuntu/apps/Muni-backend
  register: backend_repo

- name: Clonar repositorio backend (si no existe)
  ansible.builtin.git:
    repo: "{{ tfv_backend_repo }}"
    dest: /home/ubuntu/apps/Muni-backend
    version: "{{ tfv_repo_branch }}"
    force: true
  become: true
  become_user: ubuntu
  when: not backend_repo.stat.exists

- name: Actualizar repositorio backend (si ya existe)
  ansible.builtin.command:
    cmd: git pull origin {{ tfv_repo_branch }}
    chdir: /home/ubuntu/apps/Muni-backend
  become: true
  become_user: ubuntu
  when: backend_repo.stat.exists
  ignore_errors: true

- name: Verificar que repositorio frontend existe
  ansible.builtin.stat:
    path: /home/ubuntu/apps/Muni-front
  register: frontend_repo

- name: Clonar repositorio frontend (si no existe)
  ansible.builtin.git:
    repo: "{{ tfv_frontend_repo }}"
    dest: /home/ubuntu/apps/Muni-front
    version: "{{ tfv_repo_branch }}"
    force: true
  become: true
  become_user: ubuntu
  when: not frontend_repo.stat.exists

- name: Actualizar repositorio frontend (si ya existe)
  ansible.builtin.command:
    cmd: git pull origin {{ tfv_repo_branch }}
    chdir: /home/ubuntu/apps/Muni-front
  become: true
  become_user: ubuntu
  when: frontend_repo.stat.exists
  ignore_errors: true

- name: Copiar Dockerfile al backend
  ansible.builtin.copy:
    src: backend.Dockerfile
    dest: /home/ubuntu/apps/Muni-backend/Dockerfile
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  become: true

- name: Copiar .dockerignore al backend
  ansible.builtin.copy:
    src: backend.dockerignore
    dest: /home/ubuntu/apps/Muni-backend/.dockerignore
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  become: true

- name: Copiar Dockerfile al frontend
  ansible.builtin.copy:
    src: frontend.Dockerfile
    dest: /home/ubuntu/apps/Muni-front/Dockerfile
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  become: true

- name: Copiar nginx.conf al frontend
  ansible.builtin.copy:
    src: frontend.nginx.conf
    dest: /home/ubuntu/apps/Muni-front/nginx.conf
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  become: true

- name: Copiar .dockerignore al frontend
  ansible.builtin.copy:
    src: frontend.dockerignore
    dest: /home/ubuntu/apps/Muni-front/.dockerignore
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  become: true

- name: Actualizar docker-compose.yml para build local
  ansible.builtin.template:
    src: docker-compose-local.yml.j2
    dest: /opt/app/docker-compose.yml
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  become: true

- name: Parar contenedores existentes
  ansible.builtin.command:
    cmd: docker compose down
    chdir: /opt/app
  become: true
  ignore_errors: true

- name: Compilar imágenes localmente (puede tardar 5-10 minutos en t3.micro)
  ansible.builtin.shell:
    cmd: docker compose build --no-cache
    chdir: /opt/app
    executable: /bin/bash
  become: true
  register: build_result
  failed_when: build_result.rc != 0

- name: Levantar stack con imágenes locales
  ansible.builtin.shell:
    cmd: docker compose up -d --remove-orphans
    chdir: /opt/app
    executable: /bin/bash
  become: true

- name: Esperar a que los servicios estén listos
  ansible.builtin.pause:
    seconds: 20

- name: Verificar estado de contenedores
  ansible.builtin.command:
    cmd: docker ps
  become: true
  register: docker_status

- name: Mostrar estado de contenedores
  ansible.builtin.debug:
    var: docker_status.stdout_lines

- name: Mostrar URLs de acceso
  ansible.builtin.debug:
    msg:
      - "✓ Deploy completado"
      - "Frontend: {{ tfv_cors_origin }}"
      - "API: {{ tfv_public_api_url }}"
      - "Swagger: {{ tfv_public_api_url }}/api-docs"
