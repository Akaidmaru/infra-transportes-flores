---
# Deploy stack: puede compilar localmente o usar GHCR según tfv_deploy_mode

- name: Incluir tareas de deploy local (compilación en EC2)
  ansible.builtin.include_tasks: deploy-local.yml
  when: tfv_deploy_mode | default('ghcr') == 'local'

- name: Incluir tareas de deploy desde GHCR (pull de imágenes)
  ansible.builtin.include_tasks: deploy-ghcr.yml
  when: tfv_deploy_mode | default('ghcr') == 'ghcr'

