---
# Transportes Flores Vargas — runtime solo Node.js: Vue + Nest (TypeScript/JavaScript). Sin Java.
# Inventario: terraform apply → ansible_inventory. Secretos: vault.yml
- name: Aprovisionar EC2 para Vue + Nest (Docker, Node LTS, .env)
  hosts: production
  vars_files:
    - vault.yml
  become: true
  pre_tasks:
    - name: Comprobar variables de inventario (Terraform)
      ansible.builtin.assert:
        that:
          - tfv_rds_host is defined
          - tfv_rds_port is defined
          - tfv_rds_dbname is defined
          - tfv_s3_bucket is defined
        fail_msg: >-
          Falta tfv_rds_* o tfv_s3_bucket en el inventario. Ejecuta terraform apply y usa ansible/ansible_inventory generado.

    - name: Comprobar secretos en vault
      ansible.builtin.assert:
        that:
          - tfv_db_user is defined
          - tfv_db_password is defined
          - tfv_jwt_secret is defined
        fail_msg: >-
          Define tfv_db_user, tfv_db_password y tfv_jwt_secret en vault.yml (ver vault.example.yml).

    - name: Comprobar URLs e imágenes (inventario generado por Terraform)
      ansible.builtin.assert:
        that:
          - tfv_cors_origin is defined
          - tfv_public_api_url is defined
          - tfv_backend_image is defined
          - tfv_frontend_image is defined
        fail_msg: >-
          Falta tfv_public_api_url, tfv_cors_origin o imágenes GHCR. Ejecuta terraform apply
          (ansible_inventory) y define tfv_backend_image / tfv_frontend_image en terraform.tfvars.

  roles:
    - basic_setup
    - update_os
    - nodejs
    - git_auth
    - app_env
    - docker
    - deploy_stack
