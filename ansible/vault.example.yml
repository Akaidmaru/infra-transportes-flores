---
# Copia a vault.yml y cifra: ansible-vault encrypt vault.yml
# Valores de ejemplo — reemplaza antes de producción.

# Deben coincidir con el usuario/contraseña de RDS (Terraform: db_username / db_password)
tfv_db_user: "tfvadmin"
tfv_db_password: "cambiar_por_la_misma_que_terraform"

# Nest / JWT
tfv_jwt_secret: "genera_un_secreto_largo_aleatorio"

# Acceso a repositorios privados de GitHub (Personal Access Token)
# Genera el token en: GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic)
# Permisos necesarios: repo (Full control of private repositories)
tfv_github_username: "tu-usuario-github"
tfv_github_token: "ghp_tu_token_personal_de_github"

# Opcional: Brevo (emails de verificación)
# tfv_brevo_api_key: ""
# tfv_brevo_sender_email: "noreply@vectiaq.cl"
# tfv_brevo_sender_name: "Transportes Flores Vargas"

# Opcional: Google Maps (rutas; front en build local también usa map ID)
# tfv_google_maps_api_key: ""
# tfv_google_maps_map_id: "DEMO_MAP_ID"

# IAM (acceso programático a S3; el backend Nest usa estas variables)
tfv_aws_access_key_id: "AKIA..."
tfv_aws_secret_access_key: "..."
