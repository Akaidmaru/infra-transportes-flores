# Desarrollo — mismas imágenes o tags -dev; variables en .env local

services:
  frontend:
    image: ${TFV_FRONTEND_IMAGE:-ghcr.io/tu-org/tfv-frontend:dev}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - tfv-network

  backend:
    image: ${TFV_BACKEND_IMAGE:-ghcr.io/tu-org/tfv-backend:dev}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    networks:
      - tfv-network

networks:
  tfv-network:
    driver: bridge
