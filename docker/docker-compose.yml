# Transportes Flores Vargas — stack solo JS/TS: Vue (front estático en nginx) + NestJS (API).
# Sin Java/JVM. Imágenes: sustituye TFV_* por tu registry.
# Puertos en el host: 8080 → front, 3000 → API Nest. Variables: /opt/app/.env (Ansible + vault).

services:
  frontend:
    image: ${TFV_FRONTEND_IMAGE:-ghcr.io/tu-org/tfv-frontend:latest}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - tfv-network

  backend:
    image: ${TFV_BACKEND_IMAGE:-ghcr.io/tu-org/tfv-backend:latest}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    networks:
      - tfv-network

networks:
  tfv-network:
    driver: bridge
