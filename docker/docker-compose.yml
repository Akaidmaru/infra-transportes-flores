# Transportes Flores Vargas — Vue (nginx) + NestJS + Redis. Sin JVM.
# Imágenes: TFV_* en /opt/app/.env (Ansible). Puertos host: 8080 front, 3000 API.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - tfv-network

  backend:
    image: ${TFV_BACKEND_IMAGE:-ghcr.io/tu-org/tfv-backend:latest}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - redis
    networks:
      - tfv-network

  frontend:
    image: ${TFV_FRONTEND_IMAGE:-ghcr.io/tu-org/tfv-frontend:latest}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - tfv-network

networks:
  tfv-network:
    driver: bridge
