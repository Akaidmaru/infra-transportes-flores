# Transportes Flores Vargas — Vue (front) + Nest (API). Imágenes: sustituye por tus GHCR/registry.
# Variables en /opt/app/.env (Ansible roles app_env + vault)

services:
  frontend:
    image: ${TFV_FRONTEND_IMAGE:-ghcr.io/tu-org/tfv-frontend:latest}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - tfv-network

  backend:
    image: ${TFV_BACKEND_IMAGE:-ghcr.io/tu-org/tfv-backend:latest}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    networks:
      - tfv-network

networks:
  tfv-network:
    driver: bridge
