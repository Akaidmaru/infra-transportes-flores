global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "spring-boot-app"
    static_configs:
      - targets: ["backend:8080"]
    metrics_path: "/actuator/prometheus"
    scrape_interval: 10s

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 15s

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
    scrape_interval: 15s

  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
    scrape_interval: 15s
